# =============================================================================
# nginx.local.conf — HIMS Patient Intake Frontend — LOCAL/STANDALONE TESTING
# =============================================================================
# Optional: use this ONLY if you want to test the production `npm run build`
# output through nginx (closer to real deployment) instead of `npm run dev`.
# For most local testing, `npm run dev` (see LOCAL_FRONTEND_GUIDE.md) is
# simpler and sufficient.
#
# Same security header set as the production nginx.conf, adapted for
# localhost: server_name localhost, self-signed cert paths, connect-src
# allows the local backend on :8000.
# =============================================================================

limit_req_zone $binary_remote_addr zone=hims_limit:10m rate=20r/s;

map $host $csp_header {
    default "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://localhost:8000; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; block-all-mixed-content; upgrade-insecure-requests;";
}

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate     ../certs/localhost.pem;
    ssl_certificate_key ../certs/localhost-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root  dist;
    index index.html;

    limit_req zone=hims_limit burst=40 nodelay;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
    add_header Content-Security-Policy $csp_header always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    location ~* \.(js|css|woff2|woff|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
        add_header Content-Security-Policy $csp_header always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
        add_header Content-Security-Policy $csp_header always;
    }

    location ~ /\. { deny all; return 404; }
    location ~ \.(env|example|json|lock|md|yml|yaml|conf|sh)$ { deny all; return 404; }
}
