# =============================================================================
# nginx.conf — HIMS Patient Intake Frontend  ·  v2.2 (Security Headers Full)
# =============================================================================
# Deploy: copy to /etc/nginx/sites-available/hims and symlink to sites-enabled
#
# UAT REMEDIATION v2.2 — All headers now applied to EVERY location block.
# NGINX header inheritance rule: child location blocks do NOT inherit
# add_header directives from the parent server block. Every location that
# serves a response MUST re-declare the full header set. This was the root
# cause of the UAT findings for the static-asset block.
#
# Security headers are ENFORCED HERE — not in HTML meta tags.
# Meta tags cannot support X-Frame-Options or HSTS. Server headers are the
# only compliant method for PHI/HIPAA-adjacent deployments.
# =============================================================================

# ── Shared header macro (DRY via include would require nginx-extras; we
#    duplicate explicitly so the config is self-contained and auditable) ───────

# Rate limiting zone — shared memory, 10MB, 20 req/s per IP
limit_req_zone $binary_remote_addr zone=hims_limit:10m rate=20r/s;

# ── Map: define security header values once ──────────────────────────────────
# (NGINX map blocks allow us to define values in one place without include)
map $host $csp_header {
    default "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.yourhospital.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; block-all-mixed-content; upgrade-insecure-requests;";
}

server {
    # ── Redirect all HTTP → HTTPS (enforced, no fallback) ──────────────────
    listen 80;
    listen [::]:80;
    server_name hims.yourhospital.com;

    # Immediately redirect — no content served over plain HTTP
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hims.yourhospital.com;

    # ── TLS Configuration ───────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/hims.yourhospital.com.pem;
    ssl_certificate_key /etc/ssl/private/hims.yourhospital.com.key;

    # Modern TLS only — no TLS 1.0 or 1.1
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Document root (Vite production build) ───────────────────────────────
    root  /var/www/hims/dist;
    index index.html;

    # ── Rate limiting ───────────────────────────────────────────────────────
    limit_req zone=hims_limit burst=40 nodelay;

    # Remove headers that leak server information
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # ── Security Headers (server-level default) ───────────────────────────
    # NOTE: NGINX add_header does NOT inherit into child location blocks.
    # Every location block that returns a response re-declares the full set.
    # This is the correct, auditable pattern — no hidden inheritance gaps.

    # HSTS — 2 years, includeSubDomains, eligible for preload list
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Deny framing — prevents clickjacking (also covered by frame-ancestors in CSP)
    add_header X-Frame-Options "DENY" always;

    # Disable legacy XSS filter (the filter itself has known exploits in older browsers)
    add_header X-XSS-Protection "0" always;

    # Referrer-Policy — strip origin on cross-origin requests (UAT finding)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy — disable all browser features not required (UAT finding)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;

    # Content Security Policy (UAT finding — must appear on ALL responses)
    add_header Content-Security-Policy $csp_header always;

    # No caching for HTML — always fetch fresh
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # ── Static assets — long-term cache (Vite fingerprints filenames) ───────
    # CRITICAL: NGINX does NOT inherit add_header from the parent server block
    # into location blocks. The FULL security header set must be re-declared here.
    location ~* \.(js|css|woff2|woff|png|svg|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";

        # ── Full security header re-declaration (UAT remediation) ───────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "0" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
        add_header Content-Security-Policy   $csp_header always;
    }

    # ── Font MIME types ──────────────────────────────────────────────────────
    types {
        font/woff2  woff2;
        font/woff   woff;
    }

    # ── SPA routing — return index.html for all non-file routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;

        # ── Full security header re-declaration ─────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "0" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
        add_header Content-Security-Policy   $csp_header always;
        add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
        add_header Pragma                    "no-cache" always;
    }

    # ── Health check (load balancer) ─────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;

        # Security headers required even on health endpoint (scanners check it)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
        add_header Content-Security-Policy   $csp_header always;
    }

    # ── Block access to sensitive paths ──────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ \.(env|example|json|lock|md|yml|yaml|conf|sh)$ {
        deny all;
        return 404;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/hims_access.log combined;
    error_log  /var/log/nginx/hims_error.log warn;
}
