name: HIMS Frontend CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

jobs:
  build-and-audit:
    name: Build, Audit & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install — reproducible build (npm ci enforces package-lock.json)
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Run tests (46 tests)
        run: npx vitest run --reporter=verbose

      - name: Production build
        run: npm run build
        env:
          # VITE_API_URL must be set as a GitHub repository secret.
          # Go to: Settings → Secrets and variables → Actions → New repository secret
          # Name: VITE_API_URL
          # Value: https://api.yourhospital.com  (MUST be https://)
          #
          # DO NOT hardcode any URL here — the scanner will flag it.
          # If the secret is missing the build will fail here with a clear error
          # from himsApi.js resolveBaseUrl() rather than silently using a bad URL.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify no sourcemaps in dist
        run: |
          if find dist -name "*.map" | grep -q .; then
            echo "ERROR: sourcemaps found in production build — aborting"; exit 1
          fi
          echo "✅ No sourcemaps in dist"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hims-frontend-dist-v2.3
          path: dist/
          retention-days: 7
