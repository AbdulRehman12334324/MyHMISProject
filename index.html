<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:360px;
    background:#fff;
    padding:40px 30px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.container h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-size:14px;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:0.3s;
}

.input-box input:focus{
    border-color:#2c5364;
    outline:none;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    color:#2c5364;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#2c5364;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1b3946;
}

.signup{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.signup a{
    color:#2c5364;
    text-decoration:none;
    font-weight:bold;
}

.signup a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="container">

<h2>Login</h2>

<form>

<div class="input-box">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Enter your password" required>
</div>

<div class="options">
<label>
<input type="checkbox"> Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit">Login</button>

<div class="signup">
Don't have an account?
<a href="#">Sign Up</a>
</div>

</form>

</div>

</body>
</html>
